document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 }\n.nav::-webkit-scrollbar-thumb { background: #2A5973; border-radius: 999px; }\n@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex; height:100vh; width:100%; overflow:hidden; font-family:'Mulish',sans-serif; color:#2C322F; background:#F5F1EA;\">\n\n  <aside style=\"width:298px; flex:0 0 298px; height:100%; background:#143C53; color:#EAF2F7; display:flex; flex-direction:column; box-shadow:2px 0 24px rgba(20,60,83,.18); z-index:2;\">\n    <div onclick=\"{{ goHome }}\" style=\"padding:26px 24px 20px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.08);\">\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <div style=\"width:42px; height:42px; border-radius:13px; background:#F5F1EA; display:flex; align-items:center; justify-content:center; flex:0 0 42px;\">\n          <div style=\"width:15px; height:15px; border-radius:5px; background:#D9714E;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:16px; line-height:1.1; letter-spacing:-.01em;\">Protocolo de Prevención<\u002Fdiv>\n          <div style=\"font-size:12px; color:#9EC1D4; margin-top:3px;\">Acoso escolar y ciberacoso<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <nav class=\"nav\" style=\"flex:1; overflow-y:auto; padding:18px 16px 12px;\">\n      <sc-for list=\"{{ navGroups }}\" as=\"group\" hint-placeholder-count=\"3\">\n        <div style=\"margin-bottom:18px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:#6E96AC; padding:0 12px 8px;\">{{ group.title }}<\u002Fdiv>\n          <sc-for list=\"{{ group.items }}\" as=\"item\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ item.go }}\" style=\"{{ item.linkStyle }}\" style-hover=\"filter:brightness(1.08)\">\n              <span style=\"{{ item.numStyle }}\">{{ item.num }}<\u002Fspan>\n              <span>{{ item.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div style=\"padding:16px 22px 22px; border-top:1px solid rgba(255,255,255,.08); font-size:11.5px; line-height:1.5; color:#8FB2C6;\">\n      Guía dirigida a <strong style=\"color:#CFE2EC;\">docentes y personal escolar<\u002Fstrong>.<br>El Salvador · Enfoque Modelo Ecológico.\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <main ref=\"{{ setMain }}\" class=\"scrollmain\" style=\"flex:1; height:100%; overflow-y:auto; background:#F5F1EA;\">\n\n    <!-- ===================== INICIO ===================== -->\n    <sc-if value=\"{{ show.inicio }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"animation:fadeUp .45s ease both;\">\n      <div style=\"background:linear-gradient(150deg,#143C53 0%,#1E5F86 100%); color:#fff; padding:64px 56px 56px;\">\n        <div style=\"max-width:880px; margin:0 auto;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:#F0B492; margin-bottom:18px;\">Protocolo institucional · 2026<\u002Fdiv>\n          <h1 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:46px; line-height:1.06; letter-spacing:-.02em; margin:0 0 20px; text-wrap:balance;\">Prevención de la violencia social en el entorno escolar<\u002Fh1>\n          <p style=\"font-size:18px; line-height:1.65; color:#D7E6EF; max-width:640px; margin:0 0 28px;\">Un instrumento integral para identificar, prevenir, atender y eliminar el acoso escolar y el ciberacoso en los centros educativos de El Salvador, desde el enfoque del Modelo Ecológico.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:10px;\">\n            <span style=\"display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,.12); font-size:13px; font-weight:600;\">El Salvador<\u002Fspan>\n            <span style=\"display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,.12); font-size:13px; font-weight:600;\">Para docentes y personal escolar<\u002Fspan>\n            <span style=\"display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,.12); font-size:13px; font-weight:600;\">Ley Crecer Juntos<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"max-width:880px; margin:0 auto; padding:48px 56px 100px;\">\n        <div style=\"border-radius:18px; overflow:hidden; border:1px solid #E3DBCD; height:300px; margin-bottom:44px; background:#F1EBE0;\">\n          <img src=\"fb5c2840-ab95-42d5-8d07-7e6c595b31c8\" alt=\"Ilustración del Sistema Ecológico de Bronfenbrenner\" style=\"width:100%; height:100%; object-fit:contain; display:block;\">\n        <\u002Fdiv>\n\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#D9714E; margin-bottom:10px;\">Qué encontrarás<\u002Fdiv>\n        <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:27px; color:#16475F; margin:0 0 24px;\">Recorrido del documento<\u002Fh2>\n\n        <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:16px;\">\n          <sc-for list=\"{{ overview }}\" as=\"card\" hint-placeholder-count=\"6\">\n            <div onclick=\"{{ card.go }}\" style=\"background:#fff; border:1px solid #E9E2D5; border-radius:16px; padding:22px 22px 20px; cursor:pointer; transition:transform .15s,box-shadow .15s, border-color .15s;\" style-hover=\"transform:translateY(-3px); box-shadow:0 12px 26px rgba(20,60,83,.10); border-color:#C9D9E3\">\n              <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:#D9714E; margin-bottom:8px;\">{{ card.num }}<\u002Fdiv>\n              <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:18px; color:#16475F; margin-bottom:6px;\">{{ card.title }}<\u002Fdiv>\n              <div style=\"font-size:14px; line-height:1.55; color:#69706B;\">{{ card.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== INTRODUCCIÓN ===================== -->\n    <sc-if value=\"{{ show.intro }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:880px; margin:0 auto; padding:56px 56px 100px; animation:fadeUp .4s ease both;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#D9714E; margin-bottom:12px;\">01 · El documento<\u002Fdiv>\n      <h1 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:40px; line-height:1.08; color:#16475F; margin:0 0 28px; letter-spacing:-.02em;\">Introducción<\u002Fh1>\n\n      <p style=\"font-size:16.5px; line-height:1.75; color:#3A413E; margin:0 0 18px;\">El entorno escolar es, ante todo, un espacio diseñado para el desarrollo integral, el aprendizaje y la socialización de la niñez y la adolescencia. Sin embargo, la manera en que se dan los intercambios y las relaciones dentro de las instituciones educativas salvadoreñas se ve afectada con frecuencia por expresiones de violencia social que dificultan el ejercicio pleno de los derechos humanos de los estudiantes.<\u002Fp>\n      <p style=\"font-size:16.5px; line-height:1.75; color:#3A413E; margin:0 0 28px;\">Entre estas expresiones, el <strong>bullying<\u002Fstrong> y su extensión digital, el <strong>ciberbullying<\u002Fstrong>, se propagan como fenómenos sistemáticos de abuso de poder que vulneran de forma directa la integridad física, psicológica y moral de los menores de edad.<\u002Fp>\n\n      <div style=\"border-radius:18px; overflow:hidden; border:1px solid #E3DBCD; height:260px; margin:0 0 28px; background:#F1EBE0;\">\n        <img src=\"fb5c2840-ab95-42d5-8d07-7e6c595b31c8\" alt=\"Ilustración del Sistema Ecológico de Bronfenbrenner\" style=\"width:100%; height:100%; object-fit:contain; display:block;\">\n      <\u002Fdiv>\n\n      <div style=\"background:#EAF1F6; border-left:4px solid #1E5F86; border-radius:0 14px 14px 0; padding:22px 26px; margin:0 0 28px;\">\n        <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:16px; color:#16475F; margin-bottom:8px;\">Un instrumento para el contexto salvadoreño<\u002Fdiv>\n        <p style=\"font-size:15.5px; line-height:1.7; color:#3A413E; margin:0;\">Apoyándose en el <strong>Modelo Ecológico de Bronfenbrenner<\u002Fstrong> y en la estructura legal vigente, este protocolo establece pasos claros y obligatorios para la prevención temprana, la detección oportuna, el abordaje inmediato y la reparación del daño ante situaciones de acoso.<\u002Fp>\n      <\u002Fdiv>\n\n      <p style=\"font-size:16.5px; line-height:1.75; color:#3A413E; margin:0;\">A diferencia de las respuestas tradicionales, esta propuesta promueve la responsabilidad de <strong>toda la comunidad educativa<\u002Fstrong> —estudiantes, docentes, personal administrativo, padres y tutores— para transformar la escuela en un entorno seguro, equitativo y libre de violencia.<\u002Fp>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== JUSTIFICACIÓN ===================== -->\n    <sc-if value=\"{{ show.justif }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:880px; margin:0 auto; padding:56px 56px 100px; animation:fadeUp .4s ease both;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#D9714E; margin-bottom:12px;\">02 · El documento<\u002Fdiv>\n      <h1 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:40px; line-height:1.08; color:#16475F; margin:0 0 28px; letter-spacing:-.02em;\">Justificación<\u002Fh1>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:0 0 32px;\">\n        <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:18px;\">\n          <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:15px; color:#D9714E; margin-bottom:6px;\">Cultural<\u002Fdiv>\n          <div style=\"font-size:13.5px; line-height:1.55; color:#69706B;\">La normalización del \"llevarse pesado\".<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:18px;\">\n          <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:15px; color:#D9714E; margin-bottom:6px;\">Digital<\u002Fdiv>\n          <div style=\"font-size:13.5px; line-height:1.55; color:#69706B;\">El acoso que ya no termina al salir del aula.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:18px;\">\n          <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:15px; color:#D9714E; margin-bottom:6px;\">Legal<\u002Fdiv>\n          <div style=\"font-size:13.5px; line-height:1.55; color:#69706B;\">La obligación que impone la Ley Crecer Juntos.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#1E5F86; margin:0 0 12px;\">La normalización cultural<\u002Fh2>\n      <p style=\"font-size:16.5px; line-height:1.75; color:#3A413E; margin:0 0 18px;\">Tradicionalmente, las interacciones entre estudiantes en las aulas salvadoreñas han estado marcadas por la normalización del \"llevarse pesado\", la burla y la discriminación por condiciones socioeconómicas, de género o rasgos individuales. Estos comportamientos invisibilizan el sufrimiento psicológico de las víctimas, considerándolo erróneamente como parte de un proceso natural de \"maduración\" o \"fortalecimiento del carácter\".<\u002Fp>\n\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#1E5F86; margin:24px 0 12px;\">La digitalización del acoso<\u002Fh2>\n      <p style=\"font-size:16.5px; line-height:1.75; color:#3A413E; margin:0 0 18px;\">Con el acceso a dispositivos móviles e internet a edades cada vez más tempranas, el acoso ha traspasado las barreras físicas de las aulas y los horarios escolares. El ciberacoso extiende la agresión a un entorno de 24 horas, 7 días a la semana, con un alcance potencialmente masivo y una percepción de impunidad o anonimato por parte de los agresores. Su impacto psicológico es devastador.<\u002Fp>\n\n      <div style=\"background:#FBEEE8; border-left:4px solid #D9714E; border-radius:0 14px 14px 0; padding:22px 26px; margin:24px 0 0;\">\n        <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:16px; color:#B4502E; margin-bottom:8px;\">El cambio legal: Ley Crecer Juntos<\u002Fdiv>\n        <p style=\"font-size:15.5px; line-height:1.7; color:#3A413E; margin:0;\">La entrada en vigor de la Ley Crecer Juntos priorizó el principio del <strong>Interés Superior de la Niña, Niño y Adolescente<\u002Fstrong>, obligando a todas las instituciones del Estado —incluido el sistema educativo— a garantizar espacios seguros que protejan la dignidad y la integridad de los estudiantes. Este protocolo traduce ese mandato en acciones concretas dentro del aula.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== OBJETIVOS ===================== -->\n    <sc-if value=\"{{ show.objetivos }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:880px; margin:0 auto; padding:56px 56px 100px; animation:fadeUp .4s ease both;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#D9714E; margin-bottom:12px;\">03 · El documento<\u002Fdiv>\n      <h1 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:40px; line-height:1.08; color:#16475F; margin:0 0 28px; letter-spacing:-.02em;\">Objetivos<\u002Fh1>\n\n      <div style=\"background:linear-gradient(135deg,#1E5F86,#143C53); color:#fff; border-radius:18px; padding:30px 32px; margin:0 0 36px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:#F0B492; margin-bottom:12px;\">Objetivo general<\u002Fdiv>\n        <p style=\"font-size:18px; line-height:1.6; margin:0; color:#EAF2F7;\">Establecer una guía de acción clara, preventiva y práctica para las instituciones educativas de El Salvador, que permita <strong>identificar, prevenir, atender y eliminar<\u002Fstrong> el acoso escolar y el ciberacoso en menores de edad, respetando en todo momento sus derechos humanos y su bienestar físico y emocional, y promoviendo una cultura de paz desde el enfoque del Modelo Ecológico.<\u002Fp>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#1E5F86; margin:0 0 20px;\">Objetivos específicos<\u002Fh2>\n      <div style=\"display:flex; flex-direction:column; gap:14px;\">\n        <sc-for list=\"{{ objetivos }}\" as=\"o\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex; gap:18px; background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:20px 22px;\">\n            <div style=\"flex:0 0 36px; width:36px; height:36px; border-radius:10px; background:#FBEEE8; color:#D9714E; font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:17px; display:flex; align-items:center; justify-content:center;\">{{ o.n }}<\u002Fdiv>\n            <p style=\"font-size:15.5px; line-height:1.65; color:#3A413E; margin:0; align-self:center;\">{{ o.text }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== MODELO ECOLÓGICO ===================== -->\n    <sc-if value=\"{{ show.modelo }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:880px; margin:0 auto; padding:56px 56px 100px; animation:fadeUp .4s ease both;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#D9714E; margin-bottom:12px;\">04 · Fundamentos<\u002Fdiv>\n      <h1 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:40px; line-height:1.08; color:#16475F; margin:0 0 24px; letter-spacing:-.02em;\">Marco Teórico: Modelo Ecológico<\u002Fh1>\n\n      <p style=\"font-size:16.5px; line-height:1.75; color:#3A413E; margin:0 0 28px;\">El acoso y el ciberacoso no pueden entenderse de forma aislada ni resolverse castigando únicamente al agresor. Siguiendo a la OMS, este protocolo se apoya en el <strong>Modelo Ecológico del Desarrollo Humano<\u002Fstrong> de Urie Bronfenbrenner: el comportamiento no se forma solo desde adentro, sino que está influido por los distintos entornos que rodean a la persona, que se relacionan entre sí de forma constante y en ambas direcciones.<\u002Fp>\n\n      <!-- Bronfenbrenner diagram (imagen) -->\n      <figure style=\"margin:0 0 40px; display:flex; flex-direction:column; align-items:center;\">\n        <img src=\"8bcc7b1e-548a-49eb-8901-ee9361ad8038\" alt=\"Modelo Ecológico de Bronfenbrenner: el niño en el centro, rodeado por microsistema, mesosistema, exosistema, macrosistema y cronosistema\" style=\"width:100%; max-width:460px; height:auto; border-radius:18px; border:1px solid #E3DBCD; background:#fff; display:block;\">\n        <figcaption style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#9A8E74; margin-top:12px; letter-spacing:.04em;\">Los niveles del Modelo Ecológico de Bronfenbrenner<\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <div style=\"display:flex; flex-direction:column; gap:16px;\">\n        <sc-for list=\"{{ niveles }}\" as=\"lvl\" hint-placeholder-count=\"6\">\n          <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:16px; padding:24px 26px;\">\n            <div style=\"display:flex; align-items:baseline; gap:12px; margin-bottom:12px;\">\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:#D9714E;\">{{ lvl.tag }}<\u002Fspan>\n              <h3 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:21px; color:#16475F; margin:0;\">{{ lvl.title }}<\u002Fh3>\n            <\u002Fdiv>\n            <p style=\"font-size:15.5px; line-height:1.7; color:#3A413E; margin:0 0 14px;\">{{ lvl.desc }}<\u002Fp>\n            <sc-for list=\"{{ lvl.points }}\" as=\"pt\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex; gap:10px; margin-top:8px;\">\n                <div style=\"flex:0 0 7px; width:7px; height:7px; border-radius:50%; background:#D9714E; margin-top:8px;\"><\u002Fdiv>\n                <div style=\"font-size:14.5px; line-height:1.6; color:#4A514C;\"><strong style=\"color:#1E5F86;\">{{ pt.k }}<\u002Fstrong> {{ pt.v }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== MARCO NORMATIVO ===================== -->\n    <sc-if value=\"{{ show.normativo }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:880px; margin:0 auto; padding:56px 56px 100px; animation:fadeUp .4s ease both;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#D9714E; margin-bottom:12px;\">05 · Fundamentos<\u002Fdiv>\n      <h1 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:40px; line-height:1.08; color:#16475F; margin:0 0 22px; letter-spacing:-.02em;\">Marco Normativo e Institucional<\u002Fh1>\n\n      <div style=\"background:#FBEEE8; border-left:4px solid #D9714E; border-radius:0 14px 14px 0; padding:18px 24px; margin:0 0 34px;\">\n        <p style=\"font-size:15.5px; line-height:1.65; color:#3A413E; margin:0;\">Aplicar este protocolo <strong>no es opcional<\u002Fstrong>: es una obligación legal. El Estado salvadoreño ha firmado tratados internacionales y aprobado leyes nacionales que reconocen a la niñez y adolescencia como personas con derechos plenos.<\u002Fp>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#1E5F86; margin:0 0 16px;\">Constitución e instrumentos internacionales<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:0 0 16px;\">\n        <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:20px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#D9714E; margin-bottom:8px;\">CONSTITUCIÓN · ART. 2<\u002Fdiv>\n          <p style=\"font-size:14.5px; line-height:1.6; color:#3A413E; margin:0;\">Derecho a la vida, integridad física y moral, libertad y seguridad. El acoso sostenido atenta directamente contra la integridad del estudiante.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:20px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#D9714E; margin-bottom:8px;\">CONSTITUCIÓN · ART. 53<\u002Fdiv>\n          <p style=\"font-size:14.5px; line-height:1.6; color:#3A413E; margin:0;\">Derecho a la educación para el desarrollo integral de la persona. Un ambiente violento hace imposible cumplir ese propósito.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:20px; margin:0 0 34px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#D9714E; margin-bottom:8px;\">CONVENCIÓN DERECHOS DEL NIÑO · ART. 19 (ONU)<\u002Fdiv>\n        <p style=\"font-size:14.5px; line-height:1.6; color:#3A413E; margin:0;\">Ratificada por El Salvador, obliga al Estado —y por extensión a las escuelas— a tomar todas las medidas necesarias para proteger al niño de cualquier forma de maltrato físico o emocional mientras está bajo responsabilidad de adultos a su cargo, incluidos los docentes.<\u002Fp>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#1E5F86; margin:0 0 8px;\">Ley Crecer Juntos<\u002Fh2>\n      <p style=\"font-size:15.5px; line-height:1.7; color:#69706B; margin:0 0 18px;\">La columna vertebral de este protocolo. Cuatro mandatos clave:<\u002Fp>\n      <div style=\"display:flex; flex-direction:column; gap:12px; margin:0 0 34px;\">\n        <sc-for list=\"{{ crecer }}\" as=\"c\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex; gap:16px; background:#EAF1F6; border-radius:14px; padding:18px 20px;\">\n            <div style=\"flex:0 0 6px; width:6px; border-radius:999px; background:#1E5F86;\"><\u002Fdiv>\n            <div>\n              <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:15.5px; color:#16475F; margin-bottom:4px;\">{{ c.t }}<\u002Fdiv>\n              <div style=\"font-size:14.5px; line-height:1.6; color:#3A413E;\">{{ c.d }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:0 0 36px;\">\n        <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:20px;\">\n          <h3 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:16px; color:#16475F; margin:0 0 8px;\">Ley General de Educación y MINED<\u002Fh3>\n          <p style=\"font-size:14px; line-height:1.6; color:#3A413E; margin:0;\">Obliga a promover la convivencia pacífica y a contar con un reglamento de convivencia actualizado. El bullying no es una simple falta de disciplina: es una violación de derechos.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:20px;\">\n          <h3 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:16px; color:#16475F; margin:0 0 8px;\">Ley contra Delitos Informáticos<\u002Fh3>\n          <p style=\"font-size:14px; line-height:1.6; color:#3A413E; margin:0;\">Clave para el ciberacoso: sanciona compartir información privada sin consentimiento, difundir material que vulnere la intimidad de menores, y amenazar o extorsionar por medios digitales.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#1E5F86; margin:0 0 18px;\">Principios que guían el protocolo<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:12px;\">\n        <sc-for list=\"{{ principios }}\" as=\"p\" hint-placeholder-count=\"7\">\n          <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:13px; padding:16px 18px;\">\n            <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:14.5px; color:#D9714E; margin-bottom:5px;\">{{ p.t }}<\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.55; color:#4A514C;\">{{ p.d }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== PROPUESTA OPERATIVA ===================== -->\n    <sc-if value=\"{{ show.propuesta }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:880px; margin:0 auto; padding:56px 56px 100px; animation:fadeUp .4s ease both;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#D9714E; margin-bottom:12px;\">06 · Acción<\u002Fdiv>\n      <h1 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:40px; line-height:1.08; color:#16475F; margin:0 0 24px; letter-spacing:-.02em;\">Propuesta Operativa y Niveles de Prevención<\u002Fh1>\n\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#1E5F86; margin:0 0 12px;\">Diagnóstico participativo escolar<\u002Fh2>\n      <p style=\"font-size:16px; line-height:1.7; color:#3A413E; margin:0 0 20px;\">Toda intervención necesita una <strong>línea base<\u002Fstrong> que cuantifique los factores de riesgo y protectores del entorno escolar. Al no existir diagnósticos por cada centro, se adopta una inferencia macro-estadística basada en datos oficiales de El Salvador, triangulando cuatro fuentes:<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin:0 0 38px;\">\n        <sc-for list=\"{{ fuentes }}\" as=\"f\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:13px; padding:16px 18px;\">\n            <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:14px; color:#16475F; margin-bottom:5px;\">{{ f.t }}<\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.55; color:#4A514C;\">{{ f.d }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#1E5F86; margin:0 0 6px;\">Matriz de riesgo y protección<\u002Fh2>\n      <p style=\"font-size:14.5px; line-height:1.6; color:#69706B; margin:0 0 16px;\">Cruza los niveles del Modelo Ecológico con indicadores, factores de riesgo y factores protectores en el contexto salvadoreño.<\u002Fp>\n      <div style=\"overflow-x:auto; border:1px solid #E3DBCD; border-radius:16px; margin:0 0 40px; background:#fff;\">\n        <div style=\"min-width:840px;\">\n          <div style=\"display:grid; grid-template-columns:158px 1fr 1fr 1fr; background:#143C53; color:#EAF2F7;\">\n            <div style=\"padding:14px 16px; font-family:'Schibsted Grotesk',sans-serif; font-size:13px; font-weight:700;\">Nivel ecológico<\u002Fdiv>\n            <div style=\"padding:14px 16px; font-family:'Schibsted Grotesk',sans-serif; font-size:13px; font-weight:700;\">Indicadores (línea base)<\u002Fdiv>\n            <div style=\"padding:14px 16px; font-family:'Schibsted Grotesk',sans-serif; font-size:13px; font-weight:700;\">Factores de riesgo<\u002Fdiv>\n            <div style=\"padding:14px 16px; font-family:'Schibsted Grotesk',sans-serif; font-size:13px; font-weight:700;\">Factores protectores<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ matrix }}\" as=\"row\" hint-placeholder-count=\"5\">\n            <div style=\"{{ row.rowStyle }}\">\n              <div style=\"display:grid; grid-template-columns:158px 1fr 1fr 1fr; border-top:1px solid #ECE5D8;\">\n                <div style=\"padding:16px; font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:14px; color:#16475F;\">{{ row.level }}<\u002Fdiv>\n                <div style=\"padding:16px;\">\n                  <sc-for list=\"{{ row.ind }}\" as=\"x\" hint-placeholder-count=\"3\"><div style=\"font-size:12.8px; line-height:1.5; color:#4A514C; margin-bottom:6px; padding-left:13px; position:relative;\"><span style=\"position:absolute; left:0; color:#9EB4C2;\">·<\u002Fspan>{{ x }}<\u002Fdiv><\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"padding:16px;\">\n                  <sc-for list=\"{{ row.risk }}\" as=\"x\" hint-placeholder-count=\"3\"><div style=\"font-size:12.8px; line-height:1.5; color:#4A514C; margin-bottom:6px; padding-left:13px; position:relative;\"><span style=\"position:absolute; left:0; color:#D9714E;\">·<\u002Fspan>{{ x }}<\u002Fdiv><\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"padding:16px;\">\n                  <sc-for list=\"{{ row.prot }}\" as=\"x\" hint-placeholder-count=\"3\"><div style=\"font-size:12.8px; line-height:1.5; color:#4A514C; margin-bottom:6px; padding-left:13px; position:relative;\"><span style=\"position:absolute; left:0; color:#2E8B6F;\">·<\u002Fspan>{{ x }}<\u002Fdiv><\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#1E5F86; margin:0 0 20px;\">Tres niveles de intervención<\u002Fh2>\n      <div style=\"display:flex; flex-direction:column; gap:18px;\">\n        <sc-for list=\"{{ prevencion }}\" as=\"lv\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:16px; padding:24px 26px; border-top:4px solid #1E5F86;\">\n            <div style=\"display:flex; align-items:baseline; gap:12px; margin-bottom:6px;\">\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:#D9714E;\">{{ lv.tag }}<\u002Fspan>\n              <h3 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:20px; color:#16475F; margin:0;\">{{ lv.title }}<\u002Fh3>\n            <\u002Fdiv>\n            <p style=\"font-size:15px; line-height:1.65; color:#69706B; margin:0 0 16px;\">{{ lv.sub }}<\u002Fp>\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <sc-for list=\"{{ lv.acciones }}\" as=\"a\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex; gap:12px; background:#F7F4EE; border-radius:11px; padding:14px 16px;\">\n                  <div style=\"flex:0 0 26px; width:26px; height:26px; border-radius:8px; background:#fff; border:1px solid #E3DBCD; color:#D9714E; font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">{{ a.n }}<\u002Fdiv>\n                  <div><strong style=\"color:#16475F; font-size:14.5px;\">{{ a.t }}<\u002Fstrong> <span style=\"font-size:14px; line-height:1.6; color:#4A514C;\">{{ a.d }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== RUTA DE ATENCIÓN ===================== -->\n    <sc-if value=\"{{ show.ruta }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:880px; margin:0 auto; padding:56px 56px 100px; animation:fadeUp .4s ease both;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#D9714E; margin-bottom:12px;\">07 · Acción<\u002Fdiv>\n      <h1 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:40px; line-height:1.08; color:#16475F; margin:0 0 16px; letter-spacing:-.02em;\">Ruta de Atención Paso a Paso<\u002Fh1>\n      <p style=\"font-size:16px; line-height:1.7; color:#69706B; margin:0 0 36px;\">Cualquier miembro de la comunidad educativa puede activar la ruta al presenciar, sufrir o sospechar una agresión física, verbal o digital.<\u002Fp>\n\n      <!-- timeline of 4 stages -->\n      <div style=\"display:flex; flex-direction:column; gap:0;\">\n\n        <div style=\"display:flex; gap:20px;\">\n          <div style=\"flex:0 0 56px; display:flex; flex-direction:column; align-items:center;\">\n            <div style=\"width:56px; height:56px; border-radius:16px; background:#1E5F86; color:#fff; font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:20px; display:flex; align-items:center; justify-content:center;\">1<\u002Fdiv>\n            <div style=\"flex:1; width:2px; background:#D9CFBE; margin:6px 0;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1; padding-bottom:28px;\">\n            <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#16475F; margin:6px 0 4px;\">Recepción del caso<\u002Fh2>\n            <p style=\"font-size:14px; color:#D9714E; font-weight:700; margin:0 0 14px;\">Detección y denuncia · Acta en máx. 2 horas hábiles<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.65; color:#3A413E; margin:0 0 14px;\">Para eliminar barreras de denuncia se establecen tres canales oficiales:<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:0 0 16px;\">\n              <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:12px; padding:14px;\"><div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:14px; color:#16475F; margin-bottom:5px;\">Buzón de Convivencia<\u002Fdiv><div style=\"font-size:13px; line-height:1.5; color:#69706B;\">Canal escrito, ubicado donde el estudiante pueda reportar sin ser estigmatizado.<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:12px; padding:14px;\"><div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:14px; color:#16475F; margin-bottom:5px;\">Canal digital<\u002Fdiv><div style=\"font-size:13px; line-height:1.5; color:#69706B;\">Correo administrado por el Comité de Convivencia; admite capturas, enlaces y audios como prueba.<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:12px; padding:14px;\"><div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:14px; color:#16475F; margin-bottom:5px;\">Canal verbal directo<\u002Fdiv><div style=\"font-size:13px; line-height:1.5; color:#69706B;\">Comparecencia ante cualquier docente, orientador o directivo.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#FBEEE8; border-left:4px solid #D9714E; border-radius:0 12px 12px 0; padding:16px 20px;\">\n              <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:14.5px; color:#B4502E; margin-bottom:8px;\">Inadmisibilidad de trabas — el personal NO puede:<\u002Fdiv>\n              <div style=\"font-size:14px; line-height:1.7; color:#3A413E;\">Exigir pruebas o peritajes como requisito · minimizar el relato (\"son cosas de bichos\", \"vos te lo buscás\", \"eso pasó fuera del colegio\") · cuestionar el tiempo que tardó en denunciar.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:20px;\">\n          <div style=\"flex:0 0 56px; display:flex; flex-direction:column; align-items:center;\">\n            <div style=\"width:56px; height:56px; border-radius:16px; background:#1E5F86; color:#fff; font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:20px; display:flex; align-items:center; justify-content:center;\">2<\u002Fdiv>\n            <div style=\"flex:1; width:2px; background:#D9CFBE; margin:6px 0;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1; padding-bottom:28px;\">\n            <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#16475F; margin:6px 0 4px;\">Medidas provisionales de protección<\u002Fh2>\n            <p style=\"font-size:14px; color:#D9714E; font-weight:700; margin:0 0 14px;\">Primeras 72 horas · sin prejuzgar la culpabilidad<\u002Fp>\n            <p style=\"font-size:15px; line-height:1.65; color:#3A413E; margin:0 0 14px;\">El Comité y la Dirección tienen un plazo máximo de 72 horas para decretar medidas cautelares que detengan el riesgo y resguarden a la presunta víctima. Catálogo disponible:<\u002Fp>\n            <div style=\"display:flex; flex-direction:column; gap:8px;\">\n              <sc-for list=\"{{ medidas72 }}\" as=\"m\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex; gap:12px; background:#EAF1F6; border-radius:11px; padding:13px 16px;\"><div style=\"flex:0 0 7px; width:7px; height:7px; border-radius:50%; background:#1E5F86; margin-top:7px;\"><\u002Fdiv><div style=\"font-size:14px; line-height:1.6; color:#3A413E;\"><strong style=\"color:#16475F;\">{{ m.t }}<\u002Fstrong> {{ m.d }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:20px;\">\n          <div style=\"flex:0 0 56px; display:flex; flex-direction:column; align-items:center;\">\n            <div style=\"width:56px; height:56px; border-radius:16px; background:#1E5F86; color:#fff; font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:20px; display:flex; align-items:center; justify-content:center;\">3<\u002Fdiv>\n            <div style=\"flex:1; width:2px; background:#D9CFBE; margin:6px 0;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1; padding-bottom:28px;\">\n            <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#16475F; margin:6px 0 4px;\">Instrucción y debido proceso<\u002Fh2>\n            <p style=\"font-size:14px; color:#D9714E; font-weight:700; margin:0 0 14px;\">Duración máxima: 10 días hábiles<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n              <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:18px 20px;\">\n                <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:15px; color:#16475F; margin-bottom:10px;\">Derechos de la presunta víctima<\u002Fdiv>\n                <sc-for list=\"{{ derVictima }}\" as=\"d\" hint-placeholder-count=\"3\"><div style=\"font-size:13.5px; line-height:1.55; color:#4A514C; margin-bottom:8px; padding-left:12px; position:relative;\"><span style=\"position:absolute; left:0; color:#2E8B6F;\">·<\u002Fspan>{{ d }}<\u002Fdiv><\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:18px 20px;\">\n                <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:15px; color:#16475F; margin-bottom:10px;\">Derechos del presunto agresor<\u002Fdiv>\n                <sc-for list=\"{{ derAgresor }}\" as=\"d\" hint-placeholder-count=\"3\"><div style=\"font-size:13.5px; line-height:1.55; color:#4A514C; margin-bottom:8px; padding-left:12px; position:relative;\"><span style=\"position:absolute; left:0; color:#1E5F86;\">·<\u002Fspan>{{ d }}<\u002Fdiv><\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:20px;\">\n          <div style=\"flex:0 0 56px; display:flex; flex-direction:column; align-items:center;\">\n            <div style=\"width:56px; height:56px; border-radius:16px; background:#D9714E; color:#fff; font-family:'Schibsted Grotesk',sans-serif; font-weight:800; font-size:20px; display:flex; align-items:center; justify-content:center;\">4<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1; padding-bottom:10px;\">\n            <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#16475F; margin:6px 0 4px;\">Reparación integral y no repetición<\u002Fh2>\n            <p style=\"font-size:14px; color:#D9714E; font-weight:700; margin:0 0 14px;\">Reparar el daño, no solo sancionar<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n              <div style=\"background:#EAF1F6; border-radius:14px; padding:18px 20px;\">\n                <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:15px; color:#16475F; margin-bottom:10px;\">Para la víctima<\u002Fdiv>\n                <div style=\"font-size:13.5px; line-height:1.6; color:#3A413E; margin-bottom:10px;\"><strong style=\"color:#1E5F86;\">Restablecimiento del buen nombre:<\u002Fstrong> eliminación total del contenido difundido y disculpa formal (según indique el equipo psicológico).<\u002Fdiv>\n                <div style=\"font-size:13.5px; line-height:1.6; color:#3A413E;\"><strong style=\"color:#1E5F86;\">Apoyo psicológico continuo:<\u002Fstrong> coordinación con salud pública o clínicas para psicoterapia, con reportes periódicos a la dirección.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#FBEEE8; border-radius:14px; padding:18px 20px;\">\n                <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:15px; color:#B4502E; margin-bottom:10px;\">Enfoque formativo para el agresor<\u002Fdiv>\n                <div style=\"font-size:13.5px; line-height:1.6; color:#3A413E; margin-bottom:10px;\"><strong style=\"color:#B4502E;\">Sanción pedagógica con impacto social:<\u002Fstrong> proyectos de convivencia, charlas sobre ciberacoso a grados menores, brigadas supervisadas.<\u002Fdiv>\n                <div style=\"font-size:13.5px; line-height:1.6; color:#3A413E;\"><strong style=\"color:#B4502E;\">Desaprendizaje de la violencia:<\u002Fstrong> talleres obligatorios —junto a sus padres— de manejo de la ira y empatía digital.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:22px; color:#1E5F86; margin:40px 0 16px;\">Monitoreo, evaluación e información<\u002Fh2>\n      <div style=\"display:flex; flex-direction:column; gap:14px;\">\n        <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:20px 22px;\">\n          <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:16px; color:#16475F; margin-bottom:8px;\">Libro de Registro de Convivencia Escolar<\u002Fdiv>\n          <p style=\"font-size:14.5px; line-height:1.65; color:#3A413E; margin:0;\">Cada reporte, medida y resolución se asienta de forma codificada (códigos alfanuméricos que protegen la identidad). Permite detectar reincidencia por grado o sección, verificar que las medidas se emitieron dentro de las 72 horas y generar estadísticas semestrales despersonalizadas.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E9E2D5; border-radius:14px; padding:20px 22px;\">\n          <div style=\"font-family:'Schibsted Grotesk',sans-serif; font-weight:700; font-size:16px; color:#16475F; margin-bottom:8px;\">Evaluación anual de impacto<\u002Fdiv>\n          <p style=\"font-size:14.5px; line-height:1.65; color:#3A413E; margin:0 0 14px;\">Al cerrar cada año lectivo se repite la encuesta anónima para medir la eficacia real. Indicadores de éxito:<\u002Fp>\n          <div style=\"background:#143C53; color:#EAF2F7; border-radius:11px; padding:14px 18px; font-family:'IBM Plex Mono',monospace; font-size:13px; line-height:1.6; margin:0 0 14px;\">Reducción de percepción de acoso = ((% año anterior − % año actual) / % año anterior) × 100<\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.6; color:#3A413E;\"><strong style=\"color:#1E5F86;\">Eficacia operativa:<\u002Fstrong> % de casos resueltos y cerrados sin reincidencia ni represalias en los 6 meses siguientes. &nbsp;·&nbsp; <strong style=\"color:#1E5F86;\">Confianza institucional:<\u002Fstrong> aumento de estudiantes que declaran que acudirían de inmediato a denunciar usando los canales del centro.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { active: 'inicio' };\n\n  go(id) {\n    this.setState({ active: id });\n    const m = this.mainRef;\n    if (m) requestAnimationFrame(() => { try { m.scrollTop = 0; } catch (e) {} });\n  }\n\n  renderVals() {\n    const active = this.state.active;\n\n    const defs = [\n      { title: 'El documento', items: [['inicio','01','Inicio'],['intro','02','Introducción'],['justif','03','Justificación'],['objetivos','04','Objetivos']] },\n      { title: 'Fundamentos', items: [['modelo','05','Modelo Ecológico'],['normativo','06','Marco Normativo']] },\n      { title: 'Acción', items: [['propuesta','07','Propuesta Operativa'],['ruta','08','Ruta de Atención']] },\n    ];\n    const mkLink = (id, num, label) => {\n      const on = active === id;\n      return {\n        id, num, label, go: () => this.go(id),\n        linkStyle: { display:'flex', alignItems:'center', gap:'12px', padding:'10px 12px', borderRadius:'11px', cursor:'pointer', fontFamily:\"'Mulish',sans-serif\", fontSize:'14.5px', fontWeight: on ? '800' : '600', color: on ? '#16475F' : '#C2D6E2', background: on ? '#F5F1EA' : 'transparent', transition:'background .15s,color .15s' },\n        numStyle: { fontFamily:\"'IBM Plex Mono',monospace\", fontSize:'11px', fontWeight:'600', color: on ? '#D9714E' : '#6E96AC', minWidth:'18px' },\n      };\n    };\n    const navGroups = defs.map(g => ({ title: g.title, items: g.items.map(it => mkLink(it[0], it[1], it[2])) }));\n\n    const overview = [\n      ['intro','02','Introducción','Qué es este protocolo y por qué existe.'],\n      ['justif','03','Justificación','El contexto salvadoreño: cultura, mundo digital y ley.'],\n      ['objetivos','04','Objetivos','La meta general y los cinco objetivos específicos.'],\n      ['modelo','05','Modelo Ecológico','Los entornos que rodean al estudiante, según Bronfenbrenner.'],\n      ['normativo','06','Marco Normativo','La base legal que hace obligatorio actuar.'],\n      ['propuesta','07','Propuesta Operativa','Diagnóstico y tres niveles de prevención.'],\n      ['ruta','08','Ruta de Atención','Qué hacer, paso a paso, ante un caso.'],\n    ].map(o => ({ id:o[0], num:o[1], title:o[2], desc:o[3], go: () => this.go(o[0]) }));\n\n    const show = {};\n    ['inicio','intro','justif','objetivos','modelo','normativo','propuesta','ruta'].forEach(k => { show[k] = active === k; });\n\n    const objetivos = [\n      { n:'1', text:'Promover una convivencia pacífica y respetuosa en toda la comunidad educativa, reduciendo los factores que hacen ver como normal la violencia verbal, física o digital entre estudiantes.' },\n      { n:'2', text:'Identificar y dar a conocer con claridad qué conductas constituyen acoso escolar y ciberacoso en el contexto salvadoreño —cultural y tecnológico— para detectarlas a tiempo.' },\n      { n:'3', text:'Definir el camino a seguir cuando se presenta un caso: canales para reportarlo, medidas de protección inmediata y acciones disciplinarias con enfoque formativo.' },\n      { n:'4', text:'Garantizar que ningún menor afectado sea revictimizado, asegurando una atención empática, confidencial, adecuada y libre de prejuicios.' },\n      { n:'5', text:'Crear mecanismos para reparar el daño y dar seguimiento a largo plazo a las víctimas, y acciones educativas para cambiar la conducta de quienes agreden.' },\n    ];\n\n    const niveles = [\n      { tag:'2.1', title:'El Niño · Factores individuales', desc:'En el centro del modelo está el estudiante, visto desde sus características físicas, psicológicas y su historia personal.', points:[\n        { k:'Como víctima:', v:'timidez, baja autoestima, dificultad para expresarse, alguna discapacidad o cualquier rasgo que lo haga \"diferente\" (notas, orientación sexual percibida, apariencia).' },\n        { k:'Como agresor:', v:'poca empatía, impulsividad, frustración fácil, interpretar a los demás como hostiles y buscar poder imponiendo miedo; a menudo con antecedentes de maltrato familiar.' } ] },\n      { tag:'2.2', title:'El Microsistema · Entorno inmediato', desc:'El círculo más cercano al menor, con tres microsistemas en tensión constante:', points:[\n        { k:'El aula:', v:'donde ocurren las agresiones; la actitud del docente ante las burlas define si es un espacio seguro.' },\n        { k:'El grupo de pares:', v:'el bullying necesita audiencia; el silencio o el aplauso del grupo fortalece el ciclo.' },\n        { k:'La familia:', v:'la crianza y la exposición a violencia en casa influyen en cómo se comporta el menor en la escuela.' } ] },\n      { tag:'2.3', title:'El Mesosistema · Conexiones entre entornos', desc:'Los lazos y la comunicación entre los entornos del menor.', points:[\n        { k:'Familia–escuela:', v:'si los padres niegan y la escuela oculta para cuidar su imagen, el menor queda sin red de protección.' },\n        { k:'Aula–hogar digital:', v:'el ciberacoso suele ser la extensión, por celular, del acoso que empieza en la escuela.' } ] },\n      { tag:'2.4', title:'El Exosistema · Entornos indirectos', desc:'Instituciones y entornos donde el menor no participa, pero que afectan su vida.', points:[\n        { k:'Redes sociales:', v:'WhatsApp, Instagram, TikTok o Snapchat; perfiles falsos y rumores que se propagan fuera del control del estudiante.' },\n        { k:'Gestión del centro:', v:'capacitar docentes, destinar recursos a orientación y crear comités de convivencia.' },\n        { k:'Comunidad:', v:'pandillas cercanas, falta de espacios seguros y acceso limitado a salud mental.' } ] },\n      { tag:'2.5', title:'El Macrosistema · Valores y cultura', desc:'Las ideas, prejuicios y leyes que atraviesan toda la sociedad.', points:[\n        { k:'El \"llevarse pesado\":', v:'la tolerancia a la burla sexista, racista o clasista disfrazada de \"humor salvadoreño\".' },\n        { k:'Marco legal:', v:'Constitución, Ley Crecer Juntos y Ley General de Educación obligan a actuar.' } ] },\n      { tag:'+', title:'El Cronosistema · Cambios en el tiempo', desc:'La dimensión temporal: cómo los cambios biológicos y sociales modifican la experiencia del menor.', points:[\n        { k:'La adolescencia:', v:'la necesidad de pertenecer al grupo lleva a unos a acosar por estatus y a otros a callar.' },\n        { k:'Hiperconectividad post-pandemia:', v:'el acoso ya no termina al sonar el timbre; obliga a protocolos adaptados al mundo digital.' } ] },\n    ];\n\n    const crecer = [\n      { t:'Interés Superior de la Niñez', d:'Toda decisión debe priorizar el bienestar, la seguridad y el desarrollo de la víctima por encima de cualquier interés, incluida la imagen del centro.' },\n      { t:'Integridad y trato digno', d:'Prohíbe toda forma de violencia, humillación, maltrato psicológico y acoso, tanto en espacios físicos como digitales.' },\n      { t:'Obligación de denunciar', d:'Directores y docentes deben reportar de inmediato ante las Juntas de Protección, la FGR o la PNC ante una vulneración grave. No hacerlo es negligencia sancionable.' },\n      { t:'Protección en entornos digitales', d:'Reconoce los derechos de los menores en el mundo digital y obliga a crear mecanismos contra el ciberacoso y la difusión de imágenes sin consentimiento.' },\n    ];\n\n    const principios = [\n      { t:'Debida diligencia', d:'Atender cada caso de forma rápida y efectiva, desde la queja hasta el cierre del seguimiento.' },\n      { t:'Dignidad', d:'Trato respetuoso y humano a víctima, testigos y estudiante señalado como agresor.' },\n      { t:'Atención integral', d:'Espacios seguros y, cuando sea necesario, atención psicológica, pedagógica y legal.' },\n      { t:'Enfoque diferencial', d:'Reconocer que la violencia no afecta a todos igual: edad, discapacidad o situación económica.' },\n      { t:'No revictimización', d:'Prohibido forzar la \"reconciliación\" con el agresor o someter a interrogatorios repetidos.' },\n      { t:'Confidencialidad', d:'Toda la información se maneja con absoluta reserva, protegiendo la privacidad de los menores.' },\n      { t:'Celeridad', d:'Intervenir como prioridad: investigar, detener la agresión y proteger de forma oportuna.' },\n    ];\n\n    const fuentes = [\n      { t:'MINED', d:'Tasas de deserción, ausentismo recurrente y reportes de vulneraciones en los censos escolares.' },\n      { t:'Salud mental y juventud (FESPAD / IJUVE)', d:'Prevalencia de sintomatología depresiva, ideación suicida y ansiedad correlacionada con violencia relacional.' },\n      { t:'Entidades de protección (CONAPINA)', d:'Denuncias por maltrato y vulneración del Interés Superior bajo la Ley Crecer Juntos.' },\n      { t:'Grupos focales locales', d:'Mapeo cualitativo para contrastar si los datos nacionales se replican en la institución.' },\n    ];\n\n    const rowStyleA = { background:'#fff' };\n    const rowStyleB = { background:'#FAF7F1' };\n    const matrix = [\n      { level:'Individual (El Niño)', rowStyle: rowStyleA,\n        ind:['Ansiedad, aislamiento o depresión autoinformada','Baja autoestima o distorsión de la autoimagen','Conductas impulsivas y baja tolerancia a la frustración'],\n        risk:['Traumas no intervenidos por violencia familiar o comunitaria','Analfabetismo emocional','Dependencia de la validación digital','Rasgos leídos como \"debilidad\" por el grupo'],\n        prot:['Liderazgo positivo y empatía','Fortalecimiento de talentos académicos, artísticos o deportivos','Identidad y autoeficacia sanas'] },\n      { level:'Microsistema (Entorno inmediato)', rowStyle: rowStyleB,\n        ind:['Frecuencia mensual de agresiones físicas, verbales o relacionales','Reportes de exclusión o ciberacoso en chats','% que percibe el aula o recesos como inseguros'],\n        risk:['Normalización del \"llevarse pesado\"','Liderazgos negativos que instrumentalizan el acoso','Omisión docente ante microagresiones','\"Zonas ciegas\" sin supervisión','Crianza basada en castigo o negligencia'],\n        prot:['Docentes tutores presentes y empáticos','Normas de convivencia co-creadas','Canales de reporte sin represalias','Hogares con disciplina positiva y escucha'] },\n      { level:'Mesosistema (Lazos entre entornos)', rowStyle: rowStyleA,\n        ind:['Asistencia de familias a convocatorias no académicas','Reuniones familia-escuela ante alertas','Canales de comunicación comunidad-centro'],\n        risk:['Desconfianza familia-escuela','Brecha digital generacional','Castigos en casa que empujan a ocultar el acoso','Justificación parental (\"son juegos\")'],\n        prot:['\"Escuela de Familias\" formativa y periódica','Alertas tempranas por plataformas institucionales','Corresponsabilidad en la supervisión digital'] },\n      { level:'Exosistema (Entornos indirectos)', rowStyle: rowStyleB,\n        ind:['% docentes capacitados en primeros auxilios psicológicos y Ley Crecer Juntos','Disponibilidad real de psicólogos por estudiante','Denuncias canalizadas a las juntas de protección'],\n        risk:['Orientación psicológica inexistente o sobrecargada','Algoritmos que premian la viralización de humillaciones','Falta de presupuesto para salud mental escolar','Burocracia externa lenta ante crisis'],\n        prot:['Alianzas con Unidades de Salud (MINSAL) y clínicas universitarias','Vínculo con Comités Locales de Derechos de la Niñez','Comité de Convivencia juramentado y operativo'] },\n      { level:'Macrosistema (Valores y leyes)', rowStyle: rowStyleA,\n        ind:['Actualización de reglamentos internos con la Ley Crecer Juntos','Imaginarios que validan la agresión por género o condición'],\n        risk:['Cultura que asocia estatus o masculinidad con dominación','Discursos discriminatorios validados en medios y redes','Desconocimiento de las implicaciones legales del ciberacoso'],\n        prot:['Marco normativo robusto (Constitución, Crecer Juntos, Ley Gral. de Educación)','Interés Superior de la Niñez como mandato vinculante','Políticas de alfabetización digital segura'] },\n    ];\n\n    const prevencion = [\n      { tag:'4.2.1', title:'Prevención primaria (universal)', sub:'Para toda la comunidad. Interviene antes de que aparezca el acoso, actuando sobre los valores culturales.', acciones:[\n        { n:'1', t:'Currículo de alfabetización socioemocional y netiqueta:', d:'módulos semanales obligatorios sobre empatía, asertividad, autorregulación y ciudadanía digital (privacidad, doxxeo, ciberacoso).' },\n        { n:'2', t:'Campaña \"El Espectador Activo\":', d:'afiches, murales y contenido para desmontar el mito de que denunciar es ser \"chismoso\", redefiniéndolo como responsabilidad y solidaridad.' },\n        { n:'3', t:'Comité Estudiantil de Mediadores:', d:'líderes de cada grado capacitados en resolución de conflictos para disolver tensiones antes de que escalen.' } ] },\n      { tag:'4.2.2', title:'Prevención secundaria (selectiva)', sub:'Opera sobre las alertas tempranas y los perfiles propensos al conflicto o la exclusión.', acciones:[\n        { n:'1', t:'Talleres de crianza positiva para familias:', d:'sesiones prioritarias para núcleos con negligencia, autoritarismo o violencia intrafamiliar que el menor pueda replicar.' },\n        { n:'2', t:'Clubes de habilidades sociales y asertividad:', d:'espacios para estudiantes con retraimiento o timidez extrema, más vulnerables a ser blanco de agresiones.' },\n        { n:'3', t:'Auditorías de clima y rediseño de \"zonas ciegas\":', d:'rotación de asientos, dinámicas de integración y mayor vigilancia en pasillos, canchas y baños.' } ] },\n      { tag:'4.2.3', title:'Prevención terciaria (indicada)', sub:'Se activa de inmediato cuando la agresión ya ocurrió: detener el daño y sancionar con enfoque formativo y restaurativo.', acciones:[\n        { n:'1', t:'Abordaje psicológico individualizado:', d:'para la víctima, afrontamiento y resiliencia; para el agresor, terapia conductual obligatoria centrada en responsabilidad y empatía.' },\n        { n:'2', t:'Modificación temporal de entornos físicos y digitales:', d:'horarios diferenciados, cambios guiados de sección y restricción supervisada de dispositivos.' },\n        { n:'3', t:'Círculos de justicia restaurativa:', d:'mediación post-sanción para reconstruir la convivencia y evitar el estigma perpetuo.' } ] },\n    ];\n\n    const medidas72 = [\n      { t:'Separación espacial inmediata:', d:'cambio de asientos y turnos diferenciados en cafetería, laboratorios o áreas recreativas.' },\n      { t:'Acompañamiento dirigido:', d:'un docente u orientador supervisa discretamente los desplazamientos del afectado en entradas, recreos y salidas.' },\n      { t:'Adecuación académica temporal:', d:'si la afectación es severa, trabajo remoto hasta 5 días hábiles sin que compute como inasistencia ni afecte notas.' },\n      { t:'Restricción de contacto digital:', d:'bloqueo preventivo de las cuentas institucionales entre las partes para frenar amenazas o burlas.' },\n    ];\n\n    const derVictima = [\n      'No revictimización: su entrevista inicial con el psicólogo vale como declaración principal; prohibidos careos y confrontaciones.',\n      'Acompañamiento: estar acompañada por madre, padre, tutor o profesional de confianza en todas las sesiones.',\n      'Confidencialidad y reserva: actas e identidades archivadas bajo llave, sin acceso ajeno al Comité de Convivencia.',\n    ];\n    const derAgresor = [\n      'Ser escuchado y presunción de inocencia: conocer los hechos imputados y declarar con sus representantes legales.',\n      'Aportar pruebas: testimonios, capturas o argumentos en defensa dentro de los plazos establecidos.',\n      'Resolución fundamentada: notificación formal a sus padres con las consideraciones teóricas, legales y normativas de la decisión.',\n    ];\n\n    return {\n      navGroups, overview, show,\n      goHome: () => this.go('inicio'),\n      setMain: (el) => { this.mainRef = el; },\n      objetivos, niveles, crecer, principios, fuentes, matrix, prevencion,\n      medidas72, derVictima, derAgresor,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Protocolo Prevencion Acoso.dc"}
  </script>
